version: '3.8'

services:
  # React Frontend Application
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # Node.js Proxy Server (for Veo/Imagen API)
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3

  # Python Flask Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "1247:1247"
    environment:
      - FLASK_ENV=production
      - FLASK_APP=web_dashboard.py
    volumes:
      - ./backend/data:/app/data
      - ./backend/cookies:/app/cookies
      - ./backend/logs:/app/logs
      - ./backend/temp:/app/temp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1247/api/stats"]
      interval: 30s
      timeout: 3s
      retries: 3
